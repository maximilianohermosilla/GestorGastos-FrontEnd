<div class="row w-100 m-0">
    <div class="col-12">
        <h6 class="text-info">Detalle de Ahorros Mensuales por Cuenta</h6>
        <div class="chart-container shadow rounded-3 bg-dark p-2">
            <ngx-charts-bar-vertical-2d
                [view]="view"
                [scheme]="colorScheme"
                [results]="multi"
                [gradient]="gradient"
                [xAxis]="showXAxis"
                [yAxis]="showYAxis"
                [legend]="showLegend"
                [showXAxisLabel]="showXAxisLabel"
                [showYAxisLabel]="showYAxisLabel"
                [xAxisLabel]="xAxisLabel"
                [yAxisLabel]="yAxisLabel"
                [legendPosition]="legendPosition"
                (select)="onSelect($event)">
            </ngx-charts-bar-vertical-2d>
        </div>
    </div>
</div>
