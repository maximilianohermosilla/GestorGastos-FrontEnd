<div id="container__reportes" class="container__reportes w-100">
    <app-header-banner title="Reportes" icon="bar_chart"></app-header-banner>
    <div class="section__reportes w-100">
        <div class="container-fluid w-100">
            <div class="d-flex justify-content-center gap-3">
                <app-form-periodo (onChange)="getPeriodo($event)" [hiddenMonth]="true" [inputPeriodo]="fechaAnio"></app-form-periodo>
            </div>
            <mat-tab-group class="bg-dark p-2">
                <mat-tab label="General">
                    <div class="container d-flex justify-content-center text-info text-center mt-3"
                        *ngIf="(listaRegistros.length == 0 && listaIngresos.length == 0)">
                        <h6>No se encontraron resultados</h6>
                    </div>

                    <div *ngIf="!(listaRegistros.length == 0 && listaIngresos.length == 0)">
                        <h6 class="text-light mt-3 text-center text-md-start w-100 ps-2">Reporte anual por categoría (Líneas)</h6>
                        <div class="d-flex justify-content-start">
                            <app-chart-lineal class="chart__container d-flex justify-content-center gap-2"
                                [dataRegistros]="listaRegistros" [dataIngresos]="listaIngresos"
                                [hidden]="listaRegistros.length==0 && listaIngresos.length==0">
                            </app-chart-lineal>
                        </div>

                        <mat-divider class="my-4"></mat-divider>

                        <h6 class="text-light mt-3 text-center text-md-start w-100 ps-2">Reporte comparativo por categorías (Barras)</h6>
                        <div class="row px-2">
                            <mat-form-field class="col-12 col-md-6 mb-2">
                                <mat-label>Seleccionar Categorías</mat-label>
                                <mat-select [(ngModel)]="selectedCategorias" multiple>
                                    <mat-option *ngFor="let cat of listaCategoriaGasto" [value]="cat.id">
                                        {{cat.nombre}}
                                    </mat-option>
                                </mat-select>
                            </mat-form-field>
                        </div>
                        
                        <div class="d-flex justify-content-start p-2">
                            <app-chart-gastos-categorias 
                                [dataRegistros]="listaRegistros" 
                                [selectedCategories]="selectedCategorias">
                            </app-chart-gastos-categorias>
                        </div>
                    </div>
                </mat-tab>
                <mat-tab label="Ahorros">
                    <div class="container d-flex justify-content-center text-info text-center mt-3"
                        *ngIf="listaAhorros.length == 0">
                        <h6>No se encontraron ahorros registrados para este periodo</h6>
                    </div>
                    <div class="d-flex justify-content-start p-2" *ngIf="listaAhorros.length > 0">
                        <app-chart-ahorros [dataAhorros]="listaAhorros"></app-chart-ahorros>
                    </div>
                </mat-tab>
            </mat-tab-group>
        </div>
    </div>
